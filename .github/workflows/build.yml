name: Build Sky Red IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor iOS
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build IPA (unsigned)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p ios/App/build/ipa
          cp -r ios/App/build/App.xcarchive/Products/Applications/App.app \
                ios/App/build/ipa/
          cd ios/App/build/ipa
          mkdir Payload
          cp -r App.app Payload/
          zip -r SkyRed.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SkyRed-IPA
          path: ios/App/build/ipa/SkyRed.ipa
          retention-days: 30

<style>
        /* High-end Entrance Animations */
        @keyframes scale-in-center {
            0% { transform: scale(0.85); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        @keyframes slide-up-fade {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Continuous Dynamic Effects */
        @keyframes float-bob {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes glow-pulse {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(147, 0, 10, 0.3)); }
            50% { filter: drop-shadow(0 0 35px rgba(147, 0, 10, 0.6)); }
        }

        @keyframes moving-blobs {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .animate-scale-in {
            animation: scale-in-center 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-slide-up-fade {
            opacity: 0;
            animation: slide-up-fade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-float-bob {
            animation: float-bob 6s ease-in-out infinite;
        }

        .animate-glow-pulse {
            animation: glow-pulse 5s ease-in-out infinite;
        }

        .light-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.08;
            pointer-events: none;
            animation: moving-blobs 20s infinite alternate ease-in-out;
        }

        /* Accessibility: Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            .animate-scale-in, 
            .animate-slide-up-fade, 
            .animate-float-bob, 
            .animate-glow-pulse, 
            .light-blob {
                animation: none !important;
                opacity: 1 !important;
                transform: none !important;
                filter: none !important;
            }
        }
    </style>
